# AI Search Blog Optimiser — brand config
#
# The plugin works WITHOUT any config — it auto-detects your Peec project on
# first run and caches the selection. This example is only for power users who
# want deterministic behaviour or to pre-seed competitor URLs for generic mode.
#
# Actual per-brand config is written automatically to
# .context/brands/{peec_project_id}/config.yaml on first run.
# Keep the Peec linkage single-project for the plugin runtime. The project itself should be made
# usable via topics and tags, and the plugin should match prompts first rather than assuming topics
# always exist.

brand:
  name: Granola                          # friendly display name
  blog_url: https://www.granola.ai/blog  # the URL /blog-optimiser points at
  peec_project_id: null                  # leave null; resolved on first run
  role: own                              # 'own' or 'competitor'

runtime:
  max_articles_per_run: 20               # soft cap; dashboard surfaces "showing N of M"
  min_voice_samples: 8                   # below this, voice confidence flagged 'low'
  competitor_crawl_cap: 5                # max competitor URLs crawled per article
  recommender_concurrency: 3             # parallel fan-out cap
  generator_concurrency: 3

reviewers:
  path: sites/{site_key}/reviewers.json  # site-scoped reviewer source of truth in the writable data root
  selection_rules:
    prefer_source_author_if_full_name_and_role_relevant: true
    fallback_to_site_reviewers: true
    require_publicly_verifiable_people: true
    fail_if_no_valid_reviewer_exists: true

branding:
  theme: ai-heroes                       # dashboard theme — currently only 'ai-heroes'

generic_mode:
  # Used when Peec isn't connected OR no Peec project matches the blog domain.
  # Supply competitor URLs per topic so the recommender has SOMETHING to
  # benchmark against. If left empty, recommendations fall back to Schmidt
  # rules only (still useful, just less live-data-grounded).
  competitor_urls_by_topic:
    # "meeting productivity":
    #   - https://otter.ai/blog/take-better-notes
    #   - https://fireflies.ai/blog/meeting-notes-101
    # "async communication":
    #   - https://www.atlassian.com/blog/...
